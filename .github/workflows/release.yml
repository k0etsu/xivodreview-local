name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: build:win
            artifact_name: windows
            artifact_path: |
              dist/*.exe
              dist/*.zip
          - os: macos-latest
            script: build:mac
            artifact_name: macos
            artifact_path: dist/*.dmg
          - os: ubuntu-latest
            script: build:linux
            artifact_name: linux
            artifact_path: dist/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # libmpv-2.dll and mpv.exe are too large for git (~115 MB each).
      # Pinned to a specific zhongfly/mpv-winbuild tag — bump MPV_TAG to update.
      - name: Download mpv binaries (Windows only)
        if: matrix.os == 'windows-latest'
        env:
          MPV_TAG: 2026-06-29-3f1b23abd0
        run: |
          $base = "https://github.com/zhongfly/mpv-winbuild/releases/download/$env:MPV_TAG"
          $date = $env:MPV_TAG.Substring(0, 10) -replace "-", ""
          $hash = $env:MPV_TAG.Substring(11)
          Invoke-WebRequest "$base/mpv-x86_64-${date}-git-${hash}.7z"     -OutFile mpv.7z
          Invoke-WebRequest "$base/mpv-dev-x86_64-${date}-git-${hash}.7z" -OutFile mpv-dev.7z
          7z e mpv.7z     mpv.exe      -o"resources" -y
          7z e mpv-dev.7z libmpv-2.dll -o"resources" -y
        shell: pwsh

      - name: Build
        run: npm run ${{ matrix.script }} -- --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          USE_HARD_LINKS: 'false'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub release
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "xivodreview ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
